<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design System Workshop</title>
    <!--
      Apply dark mode before React mounts so there's no flash of light mode.
      Persists the user's toggle choice across reloads via localStorage.
    -->
    <script>
      ;(function () {
        var stored = localStorage.getItem('ds-workshop-dark')
        var dark = stored !== null
          ? stored === 'true'
          : window.matchMedia('(prefers-color-scheme: dark)').matches
        if (dark) document.documentElement.classList.add('dark')
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
